name: keep-warm
# Pings the Render backend so the free instance doesn't cold-start (~30-60s wake).
# Runs every ~10 min. You can also trigger it manually from the Actions tab.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --max-time 90 https://alex-harmozi.onrender.com/health || true
